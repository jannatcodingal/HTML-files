<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Currency Converter</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <nav>

            <ul>
                <div class="logo">My Currency Converter</div>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
        <div>
            <div class="container">
                <h1>Choose a currency to convert</h1>
                <form action="/action.php" method="get">
                    <label for="currency">Select currency :</label>
                    <select id="currency" name="currency">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="JPY">JPY</option>
                        <option value="AUD">AUD</option>
                    </select>
                    <label for="quantity">Amount :</label>
                    <input type="number" id="quantity" name="quantity" min="18" max="10000"><br>
                    <button type="submit" class="btn">Convert</button>
                </form>
                <div class="output">
                    <h3>Converted amount in different currencies.</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Currency</th>
                                <th>Code</th>
                                <th>Value</th>
                            </tr>
                        </thead>
                        <tbody>

                        </tbody>

                    </table>
                </div>

            </div>

        </div>

        <footer>
            <p>&copy; 2026 Currency Converter. All rights reserved.</p>
        </footer>

        <script src="script.js"></script>
        <script src="codes.json"></script>
    </body>

</html>
