<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Project</title>
    <style>
        div.relative {
            position:relative ;
            left:30px ;
            border:3px solid yellowgreen ;
        }
        div.fixed {
            position:fixed ;
            left:30px ;
            border:3px solid orange ;
        }
        div.absolute {
            position:absolute ;
            left:30px ;
            border:3px solid rgb(29, 19, 116) ;
        }
        div.static {
            position:static ;
            left:30px ;
            border:3px solid deepskyblue ;
        }
    </style>
</head>
<body>
    <h1>Position Project</h1>
    <p>An element with position: relative will be positioned relative to its normal position.</p>
    <div class="relative">
        This div has position : relative.
    </div><br><br>
    <div class="fixed">
        This div has position : fixed.
    </div><br><br>
    <div class="absolute">
        This div has position : absolute.
    </div><br><br>
    <div class="static">
        This div has position : static.
    </div>

</body>
</html>
