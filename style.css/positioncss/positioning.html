<!DOCTYPE html>
<html >

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position in css</title>
    <style>
        div {
            right: 30px;
            border: 3px solid rgba(144, 82, 192, 0.867);
        }

        div.absolute {
            position: absolute;
             left: 50px;
            border: 3px solid blue;
        }

        div.relative {
            position: relative;
            left: 100px;
            border: 3px solid rgba(82, 192, 144, 0.867);
        }

        div.fixed {
            position: fixed;
            top: 0px;
            right: 20px;
            width: 300px;
            border: 3px solid rgba(112, 44, 129, 0.867);
        }
        div.sticky {
            position: sticky;
            top: 1px;
            left: 20px;
            width: 100px;
            border: 3px solid rgba(91, 11, 116, 0.867);
        }
    </style>
</head>
<body>

    <!-- Positioning in CSS 
     Change the position property to see how the divs behave differently
     Static
     sticky
     fixed
     absolute
     relative
    relative -->


    <h2>Positioning</h2>
    <div>
        Div with no position property.
    </div>
    <div class="sticky">
        Div with sticky position.
    </div>
    <div class="fixed">
        Div with fixed position.
    </div>
    <div class="relative">
        This class has position: relative;
        <div class="absolute">
            Absolute class DIV.
        </div>
    </div>
