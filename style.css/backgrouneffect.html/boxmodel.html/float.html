<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float Example </title>
    <style>
        img#flowerright {
            float: right;
        }

        img#flowerleft {
            float: left;
        }
    </style>
</head>

<body>
    <h2>Float right</h2>
    <p>In this example, the image is floated to the right, and the text in the paragraph wraps around it.</p>
    <p>
        <img id="flowerright" src="flower.jpg" alt="Flower" style="width: 100px; height: 100px;">

        <img id="flowerleft" src="flower.jpg" alt="Flower" style="width: 100px; height: 100px;">

        This is dummy content used to understand float property.
    </p>

</body>

</html>
