<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Multiplication using functions</title>
</head>
<body>
    <h2>Multiplication using functions</h2>
    <script>
        function multiply(a, b) {
            return a * b;
        }

        var result = multiply(5, 6);
        document.write("The multiplication of 5 and 6 is: " + result);

         function multiply(a, b) {
                return a * b;
            }
            document.write("<br>");

            var result = multiply(8, 12);
            document.write("The multiplication of 8 and 12 is: " + result);

              function divide(a, b) {
                    return a / b;
                }
                document.write("<br>");

                var result = divide(144, 12);
                document.write("The division of 144 and 12 is: " + result);
            



        </script>
</body>
</html>
