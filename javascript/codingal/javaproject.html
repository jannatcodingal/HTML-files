<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Simple JavaScript Calculator</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #f4f4f4;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .calculator {
                background: #fff;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            }

            input,
            select,
            button {
                padding: 10px;
                margin: 5px 0;
                width: 100%;
                font-size: 16px;
            }

            button {
                background: #28a745;
                color: white;
                border: none;
                cursor: pointer;
            }

            button:hover {
                background: #218838;
            }
        </style>
    </head>

    <body>

        <div class="calculator">
            <h2>JavaScript Calculator</h2>
            <input type="number" id="num1" placeholder="Enter first number">
            <input type="number" id="num2" placeholder="Enter second number">

            <select id="operation">
                <option value="+">Addition (+)</option>
                <option value="-">Subtraction (-)</option>
                <option value="*">Multiplication (×)</option>
                <option value="/">Division (÷)</option>
            </select>

            <button onclick="calculate()">Calculate</button>
            <h3 id="result">Result: </h3>
        </div>

        <script>
            function calculate() {
                // Get input values
                const num1 = parseFloat(document.getElementById("num1").value);
                const num2 = parseFloat(document.getElementById("num2").value);
                const operation = document.getElementById("operation").value;
                let result;

                // Input validation
                if (isNaN(num1) || isNaN(num2)) {
                    document.getElementById("result").innerText = "Result: Please enter valid numbers.";
                    return;
                }

                // Perform calculation
                switch (operation) {
                    case "+":
                        result = num1 + num2;
                        break;
                    case "-":
                        result = num1 - num2;
                        break;
                    case "*":
                        result = num1 * num2;
                        break;
                    case "/":
                        if (num2 === 0) {
                            document.getElementById("result").innerText = "Result: Cannot divide by zero.";
                            return;
                        }
                        result = num1 / num2;
                        break;
                    default:
                        document.getElementById("result").innerText = "Result: Invalid operation.";
                        return;
                }

                // Display result
                document.getElementById("result").innerText = "Result: " + result; 
            }
        </script>

    </body>

</html>
