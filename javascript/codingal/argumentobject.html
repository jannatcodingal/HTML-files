<!DOCTYPE html>

<head>
    
    <title>Arguments in JS </title>
</head>
<body>
    <P>Find the largest value with the help of arguments objects.</P>
    <P id="result"></P>
    <script>
        function findmax() {
           var i;
           var max = 0;
              for(i = 0; i < arguments.length; i++) {
                if(arguments[i] > max) {
                     max = arguments[i];
                }
              }
              return max;
        }

       
        document.getElementById("result").innerHTML = "The largest value is: " + findmax(4,5,6);
        </script>
</body>
</html>
