<!DOCTYPE html>
<html>

    <head>

        <title>Arrow Function</title>
    </head>

    <body>
        <h2>JS arrow function</h2>
        <P>This message demonstrates the arrow function without a parameter.</P>
        <P id="result"></P>
        <script>
            const add = (a, b) => a + b;
            document.getElementById("result").innerHTML = add(4, 6);

        </script>
    </body>

</html>
