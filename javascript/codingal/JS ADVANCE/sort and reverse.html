<!DOCTYPE html>
<html>

    <head>
        <title>Sort and Reverse Numbers</title>
    </head>

    <body>
        <h2>Javascript Array Sort</h2>
        <P>Click the button to sort the numbers in ascending order.</P>
        <button onclick="ascending()">Ascending order</button>
        <button onclick="descending()">Descending order</button>
        <P id="result"></P>
        <script>
            var points = [40, 100, 1, 25, 10];
            document.getElementById("result").innerHTML = points;
            function ascending() {
                points.sort(function (a, b) {
                    return a - b;
                });
                document.getElementById("result").innerHTML = points;
            }

            function descending() {
                points.sort(function (a, b) {
                    return b - a;
                });
                document.getElementById("result").innerHTML = points;


            }

        </script>
    </body>

</html>
