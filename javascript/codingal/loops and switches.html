<!DOCTYPE html>

<head>
    
    <title>Method in JS</title>
</head>
<body>
    <h2> JS String Methods</h2>
    <p>Basic Methods in JavaScript</p>
    <script>
        var str = "AmAzInG";
        document.write(str.toUpperCase());
        document.write("<br>");
        document.write(str.toLowerCase());
        document.write("<br>");
        document.write(str.startsWith('i'));
        document.write("<br>");

        //Test Method -> returns true or false 
        var str1 = "I learnt about methods.";
        var pattern = new RegExp('about');
        var result = pattern.test(str1);
        document.write(result);
    </script>
</body>
</html>
