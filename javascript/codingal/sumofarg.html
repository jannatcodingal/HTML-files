<!DOCTYPE html>

<head>
   
    <title>Sum of arguments in Javascript</title>
</head>
<body>
    <P>Find the sum of arguments with the help of arguments objects.</P>
    <P id="result"></P>
    <script>
        function findsum() {
           var i;
           var sum = 0;
              for(i = 0; i < arguments.length; i++) {
                     sum += arguments[i];
                }
              return sum;
        }

       
        document.getElementById("result").innerHTML = "The sum of values is: " + findsum(8,3,9);

        var value1 = Math.acos(1);
        document.getElementById("result").innerHTML += "<br>The value of cos inverse of 1 is: " + value1;
        var value2 = Math.asin(0);
        document.getElementById("result").innerHTML += "<br>The value of sin inverse of 0 is: " + value2;
        var value3 = Math.atan(1);
        document.getElementById("result").innerHTML += "<br>The value of tan inverse of 1 is: " + value3;


        </script>
</body>
</html>
