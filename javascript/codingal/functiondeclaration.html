<!DOCTYPE html>
<html>
<head>
    
    <title>Function Declaration</title>
</head>
<body>
    <P>A function can  access variables defined inside the function.</P>
    <button type="button" onclick="myfunction()">Execute the button</button>
    <P id="demo"></P>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <script>
       var b = 5; // Global variable
         function myfunction(){
              var a = 4; // Local variable
              document.getElementById("demo").innerHTML = b*a;
       
              document.getElementById("demo1").innerHTML = a;
              document.getElementById("demo2").innerHTML = b;
         }
    </script>
</body>
</html>
