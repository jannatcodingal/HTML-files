<!DOCTYPE html>

<head>
   
    <title>Math Objects in JS</title>
</head>
<body>
    
        

    <script type="text/javascript">
        var value= Math.abs(20);
        document.write("Demo test value is: " + value + "<br>");

        var value= Math.acos(-1);
        document.write("Demo1 test value is: " + value + "<br>");

        var value= Math.asin(1);
        document.write("Demo2 test value is: " + value + "<br>");

        var value= Math.atan(-5);
        document.write("Demo3 test value is: " + value + "<br>");


     
            
        </script>

        </script>
</body>
</html>
