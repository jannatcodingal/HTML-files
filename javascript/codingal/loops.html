<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Loops in JS </title>
</head>
<body>
    <h2>Loops in JavaScript</h2>
    <p id="demo"></p>
    <script>
        var fruits = ["Apple", "Banana", "Mango", "Orange"];
        var text = "";
        for (var i = 0; i < fruits.length; i++) {
            text += fruits[i] + "<br>";
        }
        document.getElementById("demo").innerHTML = text;
    </script>
</body>
</html>
