    <title>Booleans</title>
</head>
<body>
    <script>
        true
        false

        console.log(3>8-5);

        console.log(5=='5.00');

        if (true) {
            console.log(5== 5.00);
        }

        if (false) {
            console.log(5== '5.00');
        } else {
            console.log('else executed');
        }

        if (30>=15) {
            console.log('this is true');
        } else if (15>=14) {
            console.log('This is also true');
        } else {
            console.log('this is false');
        }
    </script>
