<!DOCTYPE html>
<html>
    <head>
        <title>Statements</title>
    </head>
    <body>
        <h2>Javascript Statements</h2>
        <p> A <b> JavaScript Program</b> is a list of <b> Statements</b> to be executed in a computer. </p>
        <P id="demo"></P>

        <script>
            var x , y , z; // This is a single statement
            x=5; // This is another statement
            y=6; // This is another statement
            z=x + y; // This is another statement

            document.getElementById("demo").innerHTML = "The value of z is  " + z + ".";
        </script>
    </body>
</html>
