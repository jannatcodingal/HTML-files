<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
            integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>
    
<div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img class="d-block w-100" src="https://images.search.yahoo.com/search/images;_ylt=Awr.zgI7G0lp_wEAIPqJzbkF;_ylu=Y29sbwNncTEEcG9zAzEEdnRpZAMEc2VjA3Ny?fr=mcafee&p=hydrangea&imgurl=http%3A%2F%2Fupload.wikimedia.org%2Fwikipedia%2Fcommons%2F3%2F3d%2FHydrangea_macrophylla_Blauer_Prinz_2.jpg" alt="First slide">
        </div>
        <div class="carousel-item">
            <img class="d-block w-100" src="https://images.search.yahoo.com/search/images;_ylt=Awr.zgIcG0lp7gEALPqJzbkF;_ylu=Y29sbwNncTEEcG9zAzcEdnRpZAMEc2VjA3Ny?fr=mcafee&p=tulips&imgurl=https%3A%2F%2Fflorissa.com%2Fwp-content%2Fuploads%2F2023%2F09%2FTulips-Mixed-Colours-1.jpg" alt="Second slide">
        </div>
        <div class="carousel-item">
            <img class="d-block w-100" src="https://images.search.yahoo.com/search/images;_ylt=Awr.zgLXGklp_wEAw7OJzbkF;_ylu=Y29sbwNncTEEcG9zAzIEdnRpZAMEc2VjA3Ny?fr=mcafee&p=tiger+lily&imgurl=https%3A%2F%2Fwww.housedigest.com%2Fimg%2Fgallery%2Ftiger-lilies-everything-you-should-know-before-planting%2Fintro-1663266425.jpg" alt="Third slide">
        </div>
    </div>
    <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="sr-only">Previous</span>
    </a>
    <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="sr-only">Next</span>
    </a>
</div>
</body>
</html>
