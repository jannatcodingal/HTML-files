<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Study Planner</title>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
            integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
            crossorigin="anonymous"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body>
        <h1 style="color: blue;">My study planner</h1><br><br>
        <table class="table">
            <thead>
                <tr>
                    <th>#</th>
                    <th class="text-primary border-end">Monday</th>
                    <th class="text-success border-end">Tuesday</th>
                    <th class="text-warning border-end">Wednesday</th>
                    <th class="text-danger border-end">Thursday</th>
                    <th class="text-emphasis border-end">Friday</th>
                    <th class="text-muted border-end">Saturday</th>
                    <th class="text-secondary">Sunday</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="row">1</th>
                    <td class="text-success border-end">Bio</td>
                    <td class="text-success border-end">Bio</td>
                    <td class="text-success border-end">Bio</td>
                    <td class="text-success border-end">Bio</td>
                    <td class="text-success border-end">Bio</td>
                    <td class="text-success border-end">Bio</td>
                    <td class="text-success border-end">Bio</td>

                </tr>
                <tr>
                    <th scope="row">2</th>
                    <td class="text-danger border-end">Phy</td>
                    <td class="text-danger-emphasis border-end">Chem</td>
                    <td class="text-danger border-end">Phy</td>
                    <td class="text-danger-emphasis border-end">Chem</td>
                    <td class="text-danger border-end">Phy</td>
                    <td class="text-danger-emphasis border-end">Chem</td>
                    <td class="text-danger-emphasis border-end">Chem</td>
                </tr>
                <tr>
                    <th scope="row">3</th>
                    <td class="text-emphasis border-end">English</td>
                    <td class="text-muted border-end">Urdu</td>
                    <td class="text-emphasis border-end">English</td>
                    <td class="text-muted border-end">Urdu</td>
                    <td class="text-emphasis border-end">English</td>
                    <td class="text-muted border-end">Urdu</td>
                    <td class="text-emphasis border-end">English</td>
                </tr>
                <th scope="row">4</th>
                <td class="text-warning border-end">Pak studies</td>
                <td class="text-primary border-end">TQ</td>
                <td class="text-warning border-end">Pk studies</td>
                <td class="text-primary border-end">TQ</td>
                <td class="text-warning border-end">Pak Studies</td>
                <td class="text-primary border-end">TQ</td>
                <td class="text-warning border-end">Pak studies</td>

                </tr>
            </tbody>
        </table>




    </body>

</html>
