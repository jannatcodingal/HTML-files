<!doctype html>
<!doctype html>
<html lang="en">

    <head>
        <title>Bootstrap jumbotron</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
            integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
            crossorigin="anonymous"></script>
    </head>

    <body>
        <div class="container">
            <h2>Carousel Example</h2>
            <div id="my carousel" class="carousel slide" data-ride="carousel">
                <ol class="carousel indicators">
                    <li data-target="#my carousel" data-slide-to="0" class="active"></li>
                    <li data-target="#my carousel" data-slide-to="1"></li>
                    <li data-target="#my carousel" data-slide-to="2"></li>
                </ol>

                <div class="carousel inner"></div>
                <div class="carousel item active">
                    <img src="https://images4.alphacoders.com/750/thumb-1920-750745.jpg" alt="Los Angeles"
                        style="width:100%;">
                    <div class="carousel caption">


                    </div>
                </div>
                <div class="carousel item">
                    <img src="https://tse2.mm.bing.net/th/id/OIP.QCTXAbXbt9_OJ8-_d3DJmgHaE8?pid=Api&P=0&h=220"
                        alt="Chicago" style="width:100%;">

                </div>
            </div>
            <div class="carousel item">
                <img src="https://tse2.mm.bing.net/th/id/OIP.kw6MvCa0lEF911uFakMwDwHaE8?pid=Api&P=0&h=220"
                    alt="California" style="width:100%;">

            </div>
        </div>
        <a class=" left carousel-control" href="#my carousel" data-slide="prev">
            <span class="glyphicon glyphicon-chevron-left"></span>
            <span class="sr-only">Previous</span>
            </div>
            <a class=" right carousel-control" href="#my carousel" data-slide="next">
                <span class="glyphicon glyphicon-chevron-right"></span>
                <span class="sr-only">Next</span>
            </a>
            </div>
    </body>

</html>
